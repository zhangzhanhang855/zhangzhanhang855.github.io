<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>您的設備與網絡資訊(香港）</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            background-color: #f0f2f5; 
            color: #333; 
        }
        .container { 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.05); 
            max-width: 650px; 
            margin: auto; 
        }
        h1 { 
            font-size: 24px; 
            text-align: center; 
            color: #1a1a1a;
            margin-bottom: 30px;
        }
        .info-group { 
            margin-bottom: 25px; 
        }
        .info-group h2 { 
            font-size: 18px; 
            border-bottom: 2px solid #007bff; 
            padding-bottom: 8px; 
            color: #007bff; 
            margin-bottom: 15px;
        }
        .info-item { 
            margin: 12px 0; 
            font-size: 15px; 
            line-height: 1.5;
        }
        .info-item strong { 
            display: inline-block; 
            width: 130px; 
            color: #555;
        }
        .code-box {
            word-wrap: break-word; 
            background: #f8f9fa; 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid #e9ecef;
            margin-top: 8px; 
            font-size: 14px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 您的設備與網絡資訊(HK)(Made By Zhangzh)</h1>

        <div class="info-group">
            <h2>🌐 網絡與 IP 資訊</h2>
            <div class="info-item"><strong>IP 地址:</strong> <span id="ip-address">加載中...</span></div>
            <div class="info-item"><strong>網絡類型:</strong> <span id="network-type">加載中...</span></div>
            <div class="info-item"><strong>預估下載網速:</strong> <span id="network-speed">加載中...</span></div>
        </div>

        <div class="info-group">
            <h2>📱 設備與瀏覽器資訊</h2>
            <div class="info-item"><strong>操作系統平台:</strong> <span id="platform">加載中...</span></div>
            <div class="info-item"><strong>瀏覽器語言:</strong> <span id="language">加載中...</span></div>
            <div class="info-item"><strong>螢幕解析度:</strong> <span id="screen-res">加載中...</span></div>
            <div class="info-item"><strong>瀏覽器內核 (UA):</strong> 
                <div class="code-box" id="user-agent">加載中...</div>
            </div>
        </div>
    </div>

    <script>
        // 1. 獲取 IP 地址 (調用免費的第三方 API)
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('ip-address').innerText = data.ip;
            })
            .catch(error => {
                document.getElementById('ip-address').innerText = "無法獲取 IP (可能被廣告攔截器阻擋)";
                console.error('IP 獲取失敗:', error);
            });

        // 2. 獲取網絡資訊 (注意：並非所有瀏覽器都支援 navigator.connection，例如 Safari 支援度較低)
        const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (connection) {
            // effectiveType 通常返回 '4g', '3g', '2g', 'slow-2g' 等
            document.getElementById('network-type').innerText = (connection.effectiveType || '未知') + ' / ' + (connection.type || '未知');
            // downlink 返回預估帶寬 (Mbps)
            document.getElementById('network-speed').innerText = connection.downlink ? connection.downlink + ' Mbps' : '未知';
        } else {
            document.getElementById('network-type').innerText = "您的瀏覽器不支援獲取網絡狀態";
            document.getElementById('network-speed').innerText = "您的瀏覽器不支援獲取網絡狀態";
        }

        // 3. 獲取設備與瀏覽器基本資訊
        // 獲取平台 (Windows, Mac, Linux, iPhone 等)
        // 注意：現代瀏覽器逐漸棄用 navigator.platform，但在多數環境仍有效。更精確可解析 User-Agent 或使用 userAgentData
        document.getElementById('platform').innerText = navigator.platform || '未知';
        
        // 獲取語言
        document.getElementById('language').innerText = navigator.language || '未知';
        
        // 獲取螢幕解析度
        document.getElementById('screen-res').innerText = window.screen.width + " x " + window.screen.height;
        
        // 獲取 User-Agent (包含瀏覽器版本、操作系統詳細資訊等)
        document.getElementById('user-agent').innerText = navigator.userAgent;
    </script>
</body>
</html>
