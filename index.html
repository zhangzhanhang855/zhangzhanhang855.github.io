<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宇宙演变互动模拟器</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #fff;
        }
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            text-align: center;
        }
        #era-title {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(90deg, #ff8a00, #e52e71, #9b51e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #era-desc {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 20px;
            height: 40px; /* 固定高度防止跳动 */
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        #time-slider {
            flex-grow: 1;
            cursor: pointer;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
        }
        #time-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        #play-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        #play-btn:hover {
            background: #ddd;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }
        #time-display {
            font-variant-numeric: tabular-nums;
            font-weight: bold;
            width: 120px;
            text-align: right;
        }
        #hint {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    
    <div id="hint">鼠标在画面中移动可产生引力扰动</div>

    <div id="ui-container">
        <h2 id="era-title">准备大爆炸</h2>
        <p id="era-desc">时间起点。一切物质和能量聚集在一个极小、极热的奇点中。</p>
        
        <div class="controls">
            <button id="play-btn">播放</button>
            <input type="range" id="time-slider" min="0" max="13800" value="0" step="10">
            <div id="time-display">0 亿年</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('time-slider');
    const playBtn = document.getElementById('play-btn');
    const timeDisplay = document.getElementById('time-display');
    const eraTitle = document.getElementById('era-title');
    const eraDesc = document.getElementById('era-desc');

    let width, height, centerX, centerY;
    let isPlaying = false;
    let currentTime = 0; // 0 to 13800 (百万年单位)
    let animationFrameId;

    // 鼠标交互
    let mouse = { x: -1000, y: -1000 };
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        centerX = width / 2;
        centerY = height / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // 粒子系统设定
    const numParticles = 2000;
    const particles = [];
    const numGalaxies = 25;
    const galaxies = [];

    // 初始化星系中心（用于后期引力汇聚）
    for(let i = 0; i < numGalaxies; i++) {
        galaxies.push({
            x: (Math.random() - 0.5) * window.innerWidth * 1.5,
            y: (Math.random() - 0.5) * window.innerHeight * 1.5,
            size: Math.random() * 80 + 20,
            hue: Math.random() * 360
        });
    }

    // 初始化粒子
    for(let i = 0; i < numParticles; i++) {
        let gIndex = Math.floor(Math.random() * numGalaxies);
        particles.push({
            // 基础膨胀属性
            angle: Math.random() * Math.PI * 2,
            distance: Math.random(), // 0-1
            speed: Math.random() * 0.05 + 0.01,
            
            // 星系环绕属性
            gIndex: gIndex,
            gAngle: Math.random() * Math.PI * 2,
            gRadius: Math.pow(Math.random(), 2) * galaxies[gIndex].size, // 越靠近中心粒子越密集
            gSpeed: (Math.random() - 0.5) * 0.02,
            
            // 扰动
            vx: 0, vy: 0
        });
    }

    // 时代定义
    const eras = [
        { time: 0, title: "奇点时代", desc: "空间与时间的起点，温度与密度无限大。" },
        { time: 1, title: "大爆炸与暴胀", desc: "宇宙剧烈膨胀，充满极高温的等离子体（夸克-胶子等离子体）。" },
        { time: 3.8, title: "黑暗时代", desc: "38万年后，宇宙冷却，质子电子结合成中性氢，光子开始自由穿梭，但还没有恒星发光。" },
        { time: 200, title: "第一代恒星", desc: "引力使氢和氦气体云坍缩，点亮了宇宙中的第一批恒星。" },
        { time: 1000, title: "早期星系形成", desc: "恒星和暗物质在引力作用下聚集，形成最早的星系结构。" },
        { time: 5000, title: "宇宙网与星系群", desc: "星系不断碰撞合并，编织出宏伟的宇宙巨网结构。" },
        { time: 9200, title: "太阳系诞生", desc: "在银河系的一个边缘旋臂中，我们的太阳和地球开始形成。" },
        { time: 13800, title: "现今宇宙", desc: "宇宙继续加速膨胀，呈现我们今天所观测到的浩瀚星海。" }
    ];

    function updateUI(t) {
        // 更新文字
        let currentEra = eras[0];
        for(let i = eras.length - 1; i >= 0; i--) {
            if(t >= eras[i].time) {
                currentEra = eras[i];
                break;
            }
        }
        eraTitle.innerText = currentEra.title;
        eraDesc.innerText = currentEra.desc;

        // 格式化时间显示
        if (t < 1) {
            timeDisplay.innerText = "几十万年";
        } else if (t < 100) {
            timeDisplay.innerText = t.toFixed(1) + " 百万年";
        } else {
            timeDisplay.innerText = (t / 100).toFixed(2) + " 亿年";
        }
    }

    function render() {
        let t = currentTime; // 0 - 13800
        let progress = t / 13800; // 0.0 - 1.0

        // --- 背景绘制 ---
        // 模拟大爆炸初期的亮光和逐渐冷却的黑暗
        if (progress < 0.001) {
            ctx.fillStyle = `rgba(255, 255, 255, 1)`; // 极度刺眼
        } else if (progress < 0.02) { // 黑暗时代降临前
            let alpha = 1 - (progress / 0.02);
            ctx.fillStyle = `rgba(255, 150, 50, ${alpha})`; // 炽热变暗
        } else {
            // 留下拖尾效果模拟运动
            ctx.fillStyle = `rgba(5, 5, 10, ${progress > 0.1 ? 0.3 : 1})`; 
        }
        ctx.fillRect(0, 0, width, height);

        // 宇宙膨胀因子
        let expansion = Math.pow(progress, 0.3) * Math.max(width, height); 
        if (progress === 0) expansion = 0;

        // 星系汇聚因子 (从黑暗时代后开始逐渐增强)
        let clusterFactor = Math.max(0, (progress - 0.05) / 0.95);
        clusterFactor = Math.pow(clusterFactor, 2); // 非线性汇聚

        // 粒子透明度基础值
        let globalAlpha = 1;
        if (progress > 0.001 && progress < 0.05) {
            globalAlpha = 0.1; // 黑暗时代，粒子暗淡
        } else if (progress >= 0.05) {
            globalAlpha = 0.1 + clusterFactor * 0.9; // 恒星点亮
        }

        // --- 绘制粒子 ---
        for(let i = 0; i < numParticles; i++) {
            let p = particles[i];

            // 1. 基础膨胀位置 (大爆炸)
            let ex = centerX + Math.cos(p.angle) * p.distance * expansion;
            let ey = centerY + Math.sin(p.angle) * p.distance * expansion;

            // 2. 星系盘旋位置
            p.gAngle += p.gSpeed;
            let targetGalaxy = galaxies[p.gIndex];
            // 随宇宙膨胀，星系之间的距离也在拉开，这里简化为固定比例的星系坐标叠加膨胀
            let gx = centerX + targetGalaxy.x * Math.pow(progress, 0.5) + Math.cos(p.gAngle) * p.gRadius;
            let gy = centerY + targetGalaxy.y * Math.pow(progress, 0.5) + Math.sin(p.gAngle) * p.gRadius;

            // 3. 混合位置
            let finalX = ex * (1 - clusterFactor) + gx * clusterFactor;
            let finalY = ey * (1 - clusterFactor) + gy * clusterFactor;

            // 4. 鼠标引力互动
            let dx = mouse.x - finalX;
            let dy = mouse.y - finalY;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 150 && clusterFactor > 0.2) {
                // 鼠标吸引力
                p.vx += (dx / dist) * 0.5;
                p.vy += (dy / dist) * 0.5;
            }
            
            // 摩擦力衰减
            p.vx *= 0.9;
            p.vy *= 0.9;
            
            finalX += p.vx;
            finalY += p.vy;

            // 绘制
            let color = '#fff';
            if (progress < 0.001) color = '#fff';
            else if (progress < 0.05) color = '#555'; // 黑暗时代
            else {
                // 逐渐显现星系颜色
                let hue = targetGalaxy.hue + (Math.random() * 20 - 10);
                color = `hsl(${hue}, 80%, ${60 + Math.random()*40}%)`;
            }

            ctx.fillStyle = color;
            ctx.globalAlpha = globalAlpha * (0.5 + Math.random()*0.5); // 闪烁效果
            ctx.beginPath();
            // 粒子大小随汇聚程度微调
            let pSize = progress < 0.001 ? 3 : (1 + clusterFactor * 1.5);
            ctx.arc(finalX, finalY, pSize, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.globalAlpha = 1;
    }

    function loop() {
        if (isPlaying) {
            // 时间流逝速度非线性，前期慢（为了看清爆炸），后期快
            let step = currentTime < 10 ? 0.2 : (currentTime < 500 ? 5 : 20);
            currentTime += step;
            if (currentTime >= 13800) {
                currentTime = 13800;
                isPlaying = false;
                playBtn.innerText = "重置";
            }
            slider.value = currentTime;
            updateUI(currentTime);
        }
        render();
        animationFrameId = requestAnimationFrame(loop);
    }

    // 事件监听
    slider.addEventListener('input', (e) => {
        currentTime = parseFloat(e.target.value);
        updateUI(currentTime);
        if(!isPlaying) render(); // 暂停状态下拖拽也能实时更新画面
    });

    playBtn.addEventListener('click', () => {
        if (currentTime >= 13800) {
            currentTime = 0;
            slider.value = 0;
        }
        isPlaying = !isPlaying;
        playBtn.innerText = isPlaying ? "暂停" : "播放";
    });

    // 初始化第一帧
    updateUI(currentTime);
    render();
    loop();

</script>
</body>
</html>
