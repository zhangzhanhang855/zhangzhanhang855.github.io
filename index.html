<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时币种汇率查询</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .converter-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: var(--primary-color);
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .swap-btn-container {
            display: flex;
            justify-content: center;
            margin: -10px 0 10px 0;
        }

        .swap-btn {
            background: #e0e7ff;
            color: var(--primary-color);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
        }

        .swap-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: rotate(180deg);
        }

        .result-box {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            margin-top: 24px;
        }

        .result-text {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 6px;
        }

        .update-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .loading-text {
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="converter-card">
    <h2>实时汇率查询</h2>
    
    <div class="input-group">
        <label for="amount">输入金额</label>
        <input type="number" id="amount" value="100" min="0" placeholder="请输入金额">
    </div>

    <div class="input-group">
        <label for="from-currency">持有币种 (From)</label>
        <select id="from-currency">
            <option value="CNY" selected>CNY - 人民币</option>
            <option value="USD">USD - 美元</option>
            <option value="EUR">EUR - 欧元</option>
            <option value="JPY">JPY - 日元</option>
            <option value="HKD">HKD - 港币</option>
            <option value="GBP">GBP - 英镑</option>
            <option value="AUD">AUD - 澳大利亚元</option>
            <option value="CAD">CAD - 加拿大元</option>
        </select>
    </div>

    <div class="swap-btn-container">
        <button class="swap-btn" id="swap-btn" title="调换币种">⇄</button>
    </div>

    <div class="input-group">
        <label for="to-currency">兑换币种 (To)</label>
        <select id="to-currency">
            <option value="CNY">CNY - 人民币</option>
            <option value="USD" selected>USD - 美元</option>
            <option value="EUR">EUR - 欧元</option>
            <option value="JPY">JPY - 日元</option>
            <option value="HKD">HKD - 港币</option>
            <option value="GBP">GBP - 英镑</option>
            <option value="AUD">AUD - 澳大利亚元</option>
            <option value="CAD">CAD - 加拿大元</option>
        </select>
    </div>

    <div class="result-box">
        <div class="result-text" id="result-text">正在获取最新汇率...</div>
        <div class="update-time" id="update-time"></div>
    </div>
</div>

<script>
    const amountInput = document.getElementById('amount');
    const fromCurrency = document.getElementById('from-currency');
    const toCurrency = document.getElementById('to-currency');
    const swapBtn = document.getElementById('swap-btn');
    const resultText = document.getElementById('result-text');
    const updateTime = document.getElementById('update-time');

    // 缓存汇率数据，避免频繁请求 API
    let cachedRates = {};
    let currentBase = '';

    // 获取汇率数据
    async function fetchRates(baseCurrency) {
        // 如果已经缓存过该基准币种，直接返回
        if (cachedRates[baseCurrency]) {
            return cachedRates[baseCurrency];
        }

        try {
            resultText.innerText = "正在更新汇率...";
            resultText.classList.add('loading-text');
            
            // 使用免费且无需 Token 的 ExchangeRate-API 接口
            const response = await fetch(`https://open.er-api.com/v6/latest/${baseCurrency}`);
            if (!response.ok) throw new Error('网络请求失败');
            
            const data = await response.json();
            
            if (data.result === "success") {
                // 存入缓存
                cachedRates[baseCurrency] = {
                    rates: data.rates,
                    time: new Date(data.time_last_update_utc).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })
                };
                return cachedRates[baseCurrency];
            } else {
                throw new Error('获取汇率失败');
            }
        } catch (error) {
            console.error(error);
            resultText.innerText = "汇率获取失败，请稍后再试";
            resultText.classList.remove('loading-text');
            return null;
        }
    }

    // 计算并显示兑换结果
    async function calculate() {
        const amount = parseFloat(amountInput.value);
        if (isNaN(amount) || amount <= 0) {
            resultText.innerText = "0.00";
            updateTime.innerText = "";
            return;
        }

        const from = fromCurrency.value;
        const to = toCurrency.value;

        // 如果前后币种一致
        if (from === to) {
            resultText.innerText = `${amount.toFixed(2)} ${to}`;
            resultText.classList.remove('loading-text');
            updateTime.innerText = "无需转换";
            return;
        }

        const data = await fetchRates(from);
        if (data) {
            const rate = data.rates[to];
            const convertedAmount = (amount * rate).toFixed(4);
            
            resultText.classList.remove('loading-text');
            resultText.innerText = `${amount} ${from} = ${convertedAmount} ${to}`;
            updateTime.innerText = `数据更新时间 (北京时间): ${data.time}`;
        }
    }

    // 监听输入和选择变化
    amountInput.addEventListener('input', calculate);
    fromCurrency.addEventListener('change', calculate);
    toCurrency.addEventListener('change', calculate);

    // 互换币种按钮
    swapBtn.addEventListener('click', () => {
        const temp = fromCurrency.value;
        fromCurrency.value = toCurrency.value;
        toCurrency.value = temp;
        calculate();
    });

    // 页面加载时首次计算
    calculate();
</script>

</body>
</html>
