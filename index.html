<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的纯本地网页AI</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 600px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #eee; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; }
        .user { background: #e3f2fd; align-self: flex-end; }
        .ai { background: #f1f8e9; align-self: flex-start; }
        #input-area { padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { font-size: 12px; color: #666; padding: 0 20px 10px; }
    </style>
</head>
<body>

<div id="chat-container">
    <h3 style="text-align: center;">纯本地浏览器 AI</h3>
    <div id="status">正在初始化引擎 (第一次加载较慢)...</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="输入消息..." disabled>
        <button id="send-btn" disabled>发送</button>
    </div>
</div>

<!-- 引入 WebLLM 核心库 -->
<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const messagesContainer = document.getElementById("messages");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const statusLabel = document.getElementById("status");

    // 1. 配置模型 (选择一个超轻量级的模型，适合浏览器运行)
    const selectedModel = "Llama-3-8B-Instruct-q4f16_1-MLC"; 
    
    let engine;

    // 初始化 AI 引擎
    async function init() {
        engine = await webllm.createEngine(selectedModel, {
            initProgressCallback: (report) => {
                statusLabel.innerText = `加载进度: ${Math.round(report.progress * 100)}% - ${report.text}`;
            }
        });
        statusLabel.innerText = "AI 已就绪（运行在本地显卡）";
        userInput.disabled = false;
        sendBtn.disabled = false;
    }

    // 发送消息函数
    async function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;

        // 显示用户消息
        appendMessage("user", text);
        userInput.value = "";

        // AI 生成回答
        const chatMessages = [{ role: "user", content: text }];
        appendMessage("ai", "正在思考...", "current-ai");
        
        let curMessage = "";
        const reply = await engine.chat.completions.create({
            messages: chatMessages,
            stream: true, // 开启流式打印，一个字一个字出
        });

        for await (const chunk of reply) {
            const curDelta = chunk.choices[0].delta.content || "";
            curMessage += curDelta;
            document.getElementById("current-ai").innerText = curMessage;
        }
        
        document.getElementById("current-ai").removeAttribute("id");
    }

    function appendMessage(role, text, id = "") {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        if (id) div.id = id;
        div.innerText = text;
        messagesContainer.appendChild(div);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    sendBtn.onclick = handleSend;
    userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") handleSend(); });

    init();
</script>

</body>
</html>
