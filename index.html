<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 模型在线查看器</title>
    
    <!-- 引入 Google 的 model-viewer 核心库 -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        #header {
            padding: 20px;
            background-color: #2d2d2d;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #header h2 {
            margin: 0 0 10px 0;
            font-weight: 500;
        }
        
        #header p {
            margin: 0 0 15px 0;
            font-size: 14px;
            color: #aaaaaa;
        }

        /* 美化上传按钮 */
        input[type="file"] {
            display: none;
        }
        .upload-btn {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }
        .upload-btn:hover {
            background-color: #0056b3;
        }

        #viewer-container {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* model-viewer 样式设定 */
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #1e1e1e;
            --poster-color: transparent;
        }

        /* 初始提示文字 */
        .instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            text-align: center;
            pointer-events: none; /* 让鼠标穿透文字，不影响操作 */
            font-size: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="header">
        <h2>在线 3D 模型观察器</h2>
        <p>请选择您的 3D 模型文件（目前支持 Web 标准格式 <strong>.glb</strong> 或 <strong>.gltf</strong>）</p>
        <label for="file-upload" class="upload-btn">
            📂 上传 3D 文件
        </label>
        <input type="file" id="file-upload" accept=".glb,.gltf">
    </div>

    <div id="viewer-container">
        <div class="instructions" id="instruction-text">
            模型将显示在这里<br>
            👆 左键拖拽旋转 | 🖱️ 滚轮缩放 | ✋ 右键平移
        </div>
        
        <!-- 
            camera-controls: 开启鼠标控制（旋转/缩放/平移）
            auto-rotate: 开启自动缓慢旋转
            shadow-intensity: 开启底部阴影，增加立体感
        -->
        <model-viewer id="model-viewer"
                      alt="用户上传的 3D 模型"
                      camera-controls
                      auto-rotate
                      shadow-intensity="1"
                      exposure="1">
        </model-viewer>
    </div>

    <script>
        const fileUpload = document.getElementById('file-upload');
        const modelViewer = document.getElementById('model-viewer');
        const instructionText = document.getElementById('instruction-text');
        
        // 用于记录当前生成的本地文件 URL，方便后续释放内存
        let currentObjectUrl = null;

        fileUpload.addEventListener('change', function(event) {
            const file = event.target.files[0];
            
            if (file) {
                // 如果之前加载过模型，先释放旧的内存
                if (currentObjectUrl) {
                    URL.revokeObjectURL(currentObjectUrl);
                }

                // URL.createObjectURL 可以将本地文件临时转化为浏览器可以访问的 URL
                currentObjectUrl = URL.createObjectURL(file);
                
                // 将本地 URL 赋值给 3D 视图组件
                modelViewer.src = currentObjectUrl;
                
                // 隐藏背景的提示文字
                instructionText.style.display = 'none';
            }
        });
    </script>
</body>
</html>
