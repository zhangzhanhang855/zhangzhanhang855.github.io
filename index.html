<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时币种汇率查询</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .converter-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: var(--primary-color);
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            background-color: #fff;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        optgroup {
            font-weight: bold;
            color: var(--primary-color);
            font-style: normal;
        }

        optgroup option {
            color: var(--text-main);
            font-weight: normal;
        }

        .swap-btn-container {
            display: flex;
            justify-content: center;
            margin: -10px 0 10px 0;
        }

        .swap-btn {
            background: #e0e7ff;
            color: var(--primary-color);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
        }

        .swap-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: rotate(180deg);
        }

        .result-box {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            margin-top: 24px;
        }

        .result-text {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 6px;
            word-break: break-all;
        }

        .update-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .loading-text {
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="converter-card">
    <h2>实时汇率查询</h2>
    
    <div class="input-group">
        <label for="amount">输入金额</label>
        <input type="number" id="amount" value="100" min="0" placeholder="请输入金额">
    </div>

    <div class="input-group">
        <label for="from-currency">持有币种 (From)</label>
        <select id="from-currency">
            </select>
    </div>

    <div class="swap-btn-container">
        <button class="swap-btn" id="swap-btn" title="调换币种">⇄</button>
    </div>

    <div class="input-group">
        <label for="to-currency">兑换币种 (To)</label>
        <select id="to-currency">
            </select>
    </div>

    <div class="result-box">
        <div class="result-text" id="result-text">正在获取最新汇率...</div>
        <div class="update-time" id="update-time"></div>
    </div>
</div>

<script>
    // 定义 35 种主流和常见币种数据（按地区分组）
    const currencyData = [
        {
            group: "常用币种",
            currencies: [
                { code: "CNY", name: "CNY - 人民币" },
                { code: "USD", name: "USD - 美元" },
                { code: "EUR", name: "EUR - 欧元" },
                { code: "HKD", name: "HKD - 港币" },
                { code: "JPY", name: "JPY - 日元" },
                { code: "GBP", name: "GBP - 英镑" }
            ]
        },
        {
            group: "亚洲及亚太地区",
            currencies: [
                { code: "MOP", name: "MOP - 澳门币" },
                { code: "TWD", name: "TWD - 新台币" },
                { code: "KRW", name: "KRW - 韩元" },
                { code: "SGD", name: "SGD - 新加坡元" },
                { code: "MYR", name: "MYR - 马来西亚林吉特" },
                { code: "THB", name: "THB - 泰铢" },
                { code: "PHP", name: "PHP - 菲律宾比索" },
                { code: "IDR", name: "IDR - 印尼盾" },
                { code: "VND", name: "VND - 越南盾" },
                { code: "INR", name: "INR - 印度卢比" },
                { code: "AED", name: "AED - 阿联酋迪拉姆" },
                { code: "AUD", name: "AUD - 澳大利亚元" },
                { code: "NZD", name: "NZD - 新西兰元" }
            ]
        },
        {
            group: "美洲及欧洲地区",
            currencies: [
                { code: "CAD", name: "CAD - 加拿大元" },
                { code: "CHF", name: "CHF - 瑞士法郎" },
                { code: "RUB", name: "RUB - 俄罗斯卢布" },
                { code: "SEK", name: "SEK - 瑞典克朗" },
                { code: "NOK", name: "NOK - 挪威克朗" },
                { code: "DKK", name: "DKK - 丹麦克朗" },
                { code: "PLN", name: "PLN - 波兰兹罗提" },
                { code: "TRY", name: "TRY - 土耳其里拉" },
                { code: "MXN", name: "MXN - 墨西哥比索" },
                { code: "BRL", name: "BRL - 巴西雷亚尔" },
                { code: "ARS", name: "ARS - 阿根廷比索" }
            ]
        },
        {
            group: "非洲及其他地区",
            currencies: [
                { code: "ZAR", name: "ZAR - 南非兰特" },
                { code: "EGP", name: "EGP - 埃及镑" },
                { code: "SAR", name: "SAR - 沙特里亚尔" },
                { code: "ILS", name: "ILS - 以色列新谢克尔" },
                { code: "KWD", name: "KWD - 科威特第纳尔" }
            ]
        }
    ];

    const amountInput = document.getElementById('amount');
    const fromCurrency = document.getElementById('from-currency');
    const toCurrency = document.getElementById('to-currency');
    const swapBtn = document.getElementById('swap-btn');
    const resultText = document.getElementById('result-text');
    const updateTime = document.getElementById('update-time');

    let cachedRates = {};

    // 动态初始化币种下拉菜单
    function initCurrencyOptions() {
        let fromHtml = "";
        let toHtml = "";

        currencyData.forEach(group => {
            let fromGroupHtml = `<optgroup label="${group.group}">`;
            let toGroupHtml = `<optgroup label="${group.group}">`;

            group.currencies.forEach(cur => {
                // 默认持有币种选 CNY，兑换币种选 USD
                const fromSelected = cur.code === "CNY" ? "selected" : "";
                const toSelected = cur.code === "USD" ? "selected" : "";

                fromGroupHtml += `<option value="${cur.code}" ${fromSelected}>${cur.name}</option>`;
                toGroupHtml += `<option value="${cur.code}" ${toSelected}>${cur.name}</option>`;
            });

            fromGroupHtml += `</optgroup>`;
            toGroupHtml += `</optgroup>`;

            fromHtml += fromGroupHtml;
            toHtml += toGroupHtml;
        });

        fromCurrency.innerHTML = fromHtml;
        toCurrency.innerHTML = toHtml;
    }

    // 获取汇率数据
    async function fetchRates(baseCurrency) {
        if (cachedRates[baseCurrency]) {
            return cachedRates[baseCurrency];
        }

        try {
            resultText.innerText = "正在更新最新汇率...";
            resultText.classList.add('loading-text');
            
            const response = await fetch(`https://open.er-api.com/v6/latest/${baseCurrency}`);
            if (!response.ok) throw new Error('网络请求失败');
            
            const data = await response.json();
            
            if (data.result === "success") {
                cachedRates[baseCurrency] = {
                    rates: data.rates,
                    time: new Date(data.time_last_update_utc).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })
                };
                return cachedRates[baseCurrency];
            } else {
                throw new Error('获取汇率失败');
            }
        } catch (error) {
            console.error(error);
            resultText.innerText = "网络异常，汇率获取失败";
            resultText.classList.remove('loading-text');
            return null;
        }
    }

    // 计算结果
    async function calculate() {
        const amount = parseFloat(amountInput.value);
        if (isNaN(amount) || amount <= 0) {
            resultText.innerText = "0.00";
            updateTime.innerText = "";
            return;
        }

        const from = fromCurrency.value;
        const to = toCurrency.value;

        if (from === to) {
            resultText.innerText = `${amount} ${to}`;
            resultText.classList.remove('loading-text');
            updateTime.innerText = "无需转换";
            return;
        }

        const data = await fetchRates(from);
        if (data) {
            const rate = data.rates[to];
            // 针对日元、韩元、越南盾等大面额货币，保留4位小数更精准
            const convertedAmount = (amount * rate).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
            
            resultText.classList.remove('loading-text');
            resultText.innerText = `${amount.toLocaleString()} ${from} = ${convertedAmount} ${to}`;
            updateTime.innerText = `数据更新时间 (北京时间): ${data.time}`;
        }
    }

    // 事件监听
    amountInput.addEventListener('input', calculate);
    fromCurrency.addEventListener('change', calculate);
    toCurrency.addEventListener('change', calculate);

    swapBtn.addEventListener('click', () => {
        const temp = fromCurrency.value;
        fromCurrency.value = toCurrency.value;
        toCurrency.value = temp;
        calculate();
    });

    // 启动初始化
    initCurrencyOptions();
    calculate();
</script>

</body>
</html>
