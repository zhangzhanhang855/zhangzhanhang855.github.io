<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时币种及加密货币汇率查询</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --crypto-color: #f59e0b; /* 比特币金 */
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .converter-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
            position: relative;
        }

        /* 顶部闪烁的实时状态灯 */
        .live-indicator {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            align-items: center;
            font-size: 12px;
            color: #10b981;
            font-weight: bold;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            margin-right: 6px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: var(--primary-color);
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            background-color: #fff;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        optgroup {
            font-weight: bold;
            color: var(--primary-color);
        }
        
        optgroup[label*="加密货币"] {
            color: var(--crypto-color);
        }

        optgroup option {
            color: var(--text-main);
            font-weight: normal;
        }

        .swap-btn-container {
            display: flex;
            justify-content: center;
            margin: -10px 0 10px 0;
        }

        .swap-btn {
            background: #e0e7ff;
            color: var(--primary-color);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
        }

        .swap-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: rotate(180deg);
        }

        .result-box {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            margin-top: 24px;
        }

        .result-text {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 6px;
            word-break: break-all;
        }
        
        /* 当检测到加密货币高频刷新时，结果文字略微偏金黄色提示 */
        .result-box.crypto-active .result-text {
            color: #b45309;
        }

        .update-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .loading-text {
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="converter-card">
    <div class="live-indicator"><span class="dot"></span>实时秒刷开启</div>
    <h2>实时汇率 & 币价查询</h2>
    
    <div class="input-group">
        <label for="amount">输入金额 / 数量</label>
        <input type="number" id="amount" value="1" min="0" step="any" placeholder="请输入数量">
    </div>

    <div class="input-group">
        <label for="from-currency">持有币种 (From)</label>
        <select id="from-currency"></select>
    </div>

    <div class="swap-btn-container">
        <button class="swap-btn" id="swap-btn" title="调换币种">⇄</button>
    </div>

    <div class="input-group">
        <label for="to-currency">兑换币种 (To)</label>
        <select id="to-currency"></select>
    </div>

    <div class="result-box" id="result-box">
        <div class="result-text" id="result-text">加载中...</div>
        <div class="update-time" id="update-time"></div>
    </div>
</div>

<script>
    // 支持 35+ 法币 + 加密货币
    const currencyData = [
        {
            group: "⚡ 特殊/加密货币",
            currencies: [
                { code: "BTC", name: "BTC - 比特币 (Bitcoin)", isCrypto: true },
                { code: "ETH", name: "ETH - 以太坊 (Ethereum)", isCrypto: true }
            ]
        },
        {
            group: "常用法币",
            currencies: [
                { code: "CNY", name: "CNY - 人民币" },
                { code: "USD", name: "USD - 美元" },
                { code: "EUR", name: "EUR - 欧元" },
                { code: "HKD", name: "HKD - 港币" },
                { code: "JPY", name: "JPY - 日元" },
                { code: "GBP", name: "GBP - 英镑" }
            ]
        },
        {
            group: "亚洲及亚太地区法币",
            currencies: [
                { code: "MOP", name: "MOP - 澳门币" }, { code: "TWD", name: "TWD - 新台币" },
                { code: "KRW", name: "KRW - 韩元" }, { code: "SGD", name: "SGD - 新加坡元" },
                { code: "MYR", name: "MYR - 马来西亚林吉特" }, { code: "THB", name: "THB - 泰铢" },
                { code: "PHP", name: "PHP - 菲律宾比索" }, { code: "IDR", name: "IDR - 印尼盾" },
                { code: "VND", name: "VND - 越南盾" }, { code: "INR", name: "INR - 印度卢比" },
                { code: "AED", name: "AED - 阿联酋迪拉姆" }, { code: "AUD", name: "AUD - 澳大利亚元" },
                { code: "NZD", name: "NZD - 新西兰元" }
            ]
        },
        {
            group: "美洲及欧洲地区法币",
            currencies: [
                { code: "CAD", name: "CAD - 加拿大元" }, { code: "CHF", name: "CHF - 瑞士法郎" },
                { code: "RUB", name: "RUB - 俄罗斯卢布" }, { code: "SEK", name: "SEK - 瑞典克朗" },
                { code: "NOK", name: "NOK - 挪威克朗" }, { code: "DKK", name: "DKK - 丹麦克朗" },
                { code: "PLN", name: "PLN - 波兰兹罗提" }, { code: "TRY", name: "TRY - 土耳其里拉" },
                { code: "MXN", name: "MXN - 墨西哥比索" }, { code: "BRL", name: "BRL - 巴西雷亚尔" }
            ]
        }
    ];

    const amountInput = document.getElementById('amount');
    const fromCurrency = document.getElementById('from-currency');
    const toCurrency = document.getElementById('to-currency');
    const swapBtn = document.getElementById('swap-btn');
    const resultText = document.getElementById('result-text');
    const updateTime = document.getElementById('update-time');
    const resultBox = document.getElementById('result-box');

    let cachedFiatRates = {}; // 缓存法币汇率
    let updateTimer = null;   // 秒刷定时器

    // 判断某个币种是否是加密货币
    function checkIsCrypto(code) {
        return code === "BTC" || code === "ETH";
    }

    // 初始化下拉菜单
    function initOptions() {
        let fromHtml = "", toHtml = "";
        currencyData.forEach(group => {
            let fromGroup = `<optgroup label="${group.group}">`, toGroup = `<optgroup label="${group.group}">`;
            group.currencies.forEach(cur => {
                fromGroup += `<option value="${cur.code}" ${cur.code==="BTC"?"selected":""}>${cur.name}</option>`;
                toGroup += `<option value="${cur.code}" ${cur.code==="CNY"?"selected":""}>${cur.name}</option>`;
            });
            fromHtml += fromGroup + `</optgroup>`;
            toHtml += toGroup + `</optgroup>`;
        });
        fromCurrency.innerHTML = fromHtml;
        toCurrency.innerHTML = toHtml;
    }

    // 从币安 API 获取加密货币相对 USD 的秒级实时价格
    async function fetchCryptoPriceInUSD(cryptoCode) {
        try {
            const response = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${cryptoCode}USDT`);
            if (!response.ok) throw new Error();
            const data = await response.json();
            return parseFloat(data.price);
        } catch (e) {
            // 备用备用接口，防止币安部分地区网络墙
            try {
                const resBackup = await fetch(`https://min-api.cryptocompare.com/data/price?fsym=${cryptoCode}&tsyms=USD`);
                const dataBackup = await resBackup.json();
                return dataBackup.USD;
            } catch(err) {
                return null;
            }
        }
    }

    // 获取传统法币汇率（以 USD 为基准）
    async function fetchFiatRatesInUSD() {
        if (cachedFiatRates["USD"]) return cachedFiatRates["USD"];
        try {
            const response = await fetch(`https://open.er-api.com/v6/latest/USD`);
            const data = await response.json();
            if (data.result === "success") {
                cachedFiatRates["USD"] = data.rates;
                return data.rates;
            }
        } catch (e) {
            console.error("法币汇率获取失败", e);
        }
        return null;
    }

    // 核心计算逻辑
    async function calculate() {
        const amount = parseFloat(amountInput.value);
        if (isNaN(amount) || amount <= 0) {
            resultText.innerText = "0.00";
            updateTime.innerText = "";
            return;
        }

        const from = fromCurrency.value;
        const to = toCurrency.value;

        if (from === to) {
            resultText.innerText = `${amount} ${to}`;
            updateTime.innerText = "无需转换";
            return;
        }

        // 高亮样式控制
        if (checkIsCrypto(from) || checkIsCrypto(to)) {
            resultBox.classList.add('crypto-active');
        } else {
            resultBox.classList.remove('crypto-active');
        }

        // 统一逻辑：将所有币种先换算成中介基础货币「USD」，再换算成目标货币
        let fromPriceInUSD = 1; 
        let toPriceInUSD = 1;   

        const fiatRates = await fetchFiatRatesInUSD();
        if (!fiatRates) {
            resultText.innerText = "网络异常，请稍后";
            return;
        }

        // 1. 计算【持有币种】价值多少 USD
        if (checkIsCrypto(from)) {
            fromPriceInUSD = await fetchCryptoPriceInUSD(from);
        } else {
            fromPriceInUSD = 1 / fiatRates[from]; 
        }

        // 2. 计算【目标币种】价值多少 USD
        if (checkIsCrypto(to)) {
            toPriceInUSD = await fetchCryptoPriceInUSD(to);
        } else {
            toPriceInUSD = 1 / fiatRates[to];
        }

        if (!fromPriceInUSD || !toPriceInUSD) {
            resultText.innerText = "读取实时价格失败...";
            return;
        }

        // 3. 最终兑换公式： 金额 * (持有币种USD价值 / 目标币种USD价值)
        const finalValue = amount * (fromPriceInUSD / toPriceInUSD);
        
        // 动态控制精度（如果是 BTC/ETH 数量通常比较小，保留 6 位小数；如果是法币保留 2~4 位）
        const maxDecimals = checkIsCrypto(to) ? 6 : (['JPY','KRW','VND'].includes(to) ? 2 : 4);
        
        resultText.innerText = `${amount.toLocaleString(undefined, {maximumFractionDigits:8})} ${from} = ${finalValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: maxDecimals})} ${to}`;
        
        const now = new Date();
        updateTime.innerText = `最后更新: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')} (每秒自动刷新)`;
    }

    // 重置并启动每秒定时器
    function startInterval() {
        if (updateTimer) clearInterval(updateTimer);
        // 每 1000 毫秒（1秒）强制重新计算/请求
        updateTimer = setInterval(() => {
            calculate();
        }, 1000);
    }

    // 事件监听
    amountInput.addEventListener('input', () => { calculate(); startInterval(); });
    fromCurrency.addEventListener('change', () => { calculate(); startInterval(); });
    toCurrency.addEventListener('change', () => { calculate(); startInterval(); });

    swapBtn.addEventListener('click', () => {
        const temp = fromCurrency.value;
        fromCurrency.value = toCurrency.value;
        toCurrency.value = temp;
        calculate();
        startInterval();
    });

    // 运行
    initOptions();
    calculate();
    startInterval(); // 页面打开即刻开启每秒循环
</script>

</body>
</html>
