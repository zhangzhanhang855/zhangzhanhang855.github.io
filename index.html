    <style>
        :root {
            --table-green: #1a4a2e;
            --gold: #f1c40f;
            --card-white: #ffffff;
            --transition-speed: 0.3s;
        }

        body, html {

        }

        #scene {
            width: 100vw; height: 100vh;

        #table {

            position: relative;

        /* 难度选择遮罩 */
        #menu-overlay {
            position: fixed; inset: 0; z-index: 9999;

        .btn {
            padding: 15px 45px; margin: 15px; font-size: 1.2rem;

            color: white; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);

        }
        .btn:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 15px 25px rgba(243, 156, 18, 0.4); }

        /* 卡牌基础样式 */

        .card.selected {

        .card-val { font-size: 28px; line-height: 1; }

        .ai-back {

        /* 布局区域 */

            white-space: nowrap;

        /* 动画关键帧 */

        @keyframes tableShake {
            0% { transform: rotateX(25deg) translate(0,0); }

            50% { transform: rotateX(25deg) translate(10px, -5px); }
            75% { transform: rotateX(25deg) translate(-10px, -5px); }
            100% { transform: rotateX(25deg) translate(0,0); }
        }
    </style>
</head>
<body>

<div id="scene">
    <div id="menu-overlay">
        <h1 style="font-size: 3.5rem; margin-bottom: 0;">至尊斗地主 3D</h1>
        <p style="letter-spacing: 3px; color: #aaa;">SUPREME POKER 3D</p>
        <button class="btn" onclick="game.start('hard')">地狱难度 AI</button>
        <button class="btn" onclick="game.start('easy')" style="background: #34495e;">新手练习</button>
    </div>

    <div id="table">
        <!-- AI 区域 -->
        <div id="ai-hand" class="hand-container"></div>

        <!-- 出牌区 -->
        <div id="desk-area">
            <div id="ai-out" class="played-cards"></div>
            <div id="player-out" class="played-cards"></div>
        </div>

        <!-- 玩家区域 -->
        <div id="player-hand" class="hand-container"></div>

        <!-- 文字特效层 -->
        <div id="msg-box">炸弹</div>

        <!-- 按钮层 -->
        <div class="controls" id="game-controls" style="display: none;">
            <button class="btn" style="padding: 10px 30px;" onclick="game.play()">出牌</button>
            <button class="btn" style="padding: 10px 30px; background: #7f8c8d;" onclick="game.pass()">不出</button>
            <button class="btn" style="padding: 10px 30px; background: #2980b9;" onclick="game.hint()">提示</button>
        </div>
    </div>
</div>

<script>
/**
 * 核心扑克规则引擎
 */
const CardRule = {
    // 权值定义：3-10, J:11, Q:12, K:13, A:14, 2:15, 小王:16, 大王:17
    getType(cards) {
        if (!cards || cards.length === 0) return null;
        const len = cards.length;
        const vals = cards.map(c => c.val).sort((a, b) => a - b);
        const counts = {};
        vals.forEach(v => counts[v] = (counts[v] || 0) + 1);
        const countKeys = Object.keys(counts).map(Number).sort((a,b)=>a-b);
        const countValues = Object.values(counts);

        // 1. 王炸
        if (len === 2 && vals[0] === 16 && vals[1] === 17) return { type: 'ROCKET', weight: 9999, len };
        
        // 2. 炸弹
        if (len === 4 && countValues.includes(4)) return { type: 'BOMB', weight: countKeys.find(k => counts[k] === 4) + 1000, len };

        // 3. 单张
        if (len === 1) return { type: 'SINGLE', weight: vals[0], len };

        // 4. 对子
        if (len === 2 && countValues.includes(2)) return { type: 'PAIR', weight: vals[0], len };

        // 5. 三张
        if (len === 3 && countValues.includes(3)) return { type: 'TRIO', weight: vals[0], len };

        // 6. 三带一 / 三带对
        if (len === 4 && countValues.includes(3)) return { type: 'TRIO_1', weight: countKeys.find(k => counts[k] === 3), len };
        if (len === 5 && countValues.includes(3) && countValues.includes(2)) return { type: 'TRIO_2', weight: countKeys.find(k => counts[k] === 3), len };

        // 7. 顺子
        if (len >= 5 && countValues.every(v => v === 1) && (vals[len-1] - vals[0] === len - 1) && vals[len-1] < 15) {
            return { type: 'STRAIGHT', weight: vals[0], len };
        }

        // 8. 连对
        if (len >= 6 && len % 2 === 0 && countValues.every(v => v === 2) && (vals[countKeys.length-1] - vals[0] === countKeys.length-1) && vals[len-1] < 15) {
            return { type: 'DOUBLE_STRAIGHT', weight: vals[0], len };
        }

        return null;
    },

    // 比较逻辑：修复了无法压过的问题
    canBeat(newCards, oldMove) {
        if (!oldMove) return true;
        const newMove = this.getType(newCards);
        if (!newMove) return false;

        // 王炸无敌
        if (newMove.type === 'ROCKET') return true;
        if (oldMove.type === 'ROCKET') return false;

        // 炸弹逻辑
        if (newMove.type === 'BOMB' && oldMove.type !== 'BOMB') return true;
        
        // 普通牌型：类型必须一致且长度必须一致
        if (newMove.type === oldMove.type && newMove.len === oldMove.len) {
            return newMove.weight > oldMove.weight;
        }

        return false;
    }
};

/**
 * 游戏管理器
 */
const game = {
    playerHand: [],
    aiHand: [],
    selectedIndices: [],
    lastMove: null, // {type, weight, len, cards}
    turn: 'player',

    start(difficulty) {
        document.getElementById('menu-overlay').style.opacity = 0;
        setTimeout(() => {
            document.getElementById('menu-overlay').style.display = 'none';
            document.getElementById('game-controls').style.display = 'flex';
        }, 500);

        // 初始化牌堆
        let deck = [];
        const suits = ['♠', '♥', '♣', '♦'];
        for (let v = 3; v <= 15; v++) {
            suits.forEach((s, i) => deck.push({ val: v, suit: s, color: (i%2===1?'red':'black') }));
        }
        deck.push({ val: 16, suit: '🃏', color: 'red' });
        deck.push({ val: 17, suit: '🃏', color: 'red' });
        deck.sort(() => Math.random() - 0.5);

        this.playerHand = deck.slice(0, 17).sort((a,b) => b.val - a.val);
        this.aiHand = deck.slice(17, 34).sort((a,b) => b.val - a.val);
        this.render();
    },

    render() {
        const pArea = document.getElementById('player-hand');
        pArea.innerHTML = '';
        this.playerHand.forEach((c, i) => {
            const cardEl = this.createCardEl(c);
            if (this.selectedIndices.includes(i)) cardEl.classList.add('selected');
            cardEl.onclick = () => this.toggleSelect(i);
            pArea.appendChild(cardEl);
        });

        const aArea = document.getElementById('ai-hand');
        aArea.innerHTML = '';
        this.aiHand.forEach(() => {
            const cardEl = document.createElement('div');
            cardEl.className = 'card ai-back';
            aArea.appendChild(cardEl);
        });
    },

    createCardEl(c) {
        const map = {11:'J', 12:'Q', 13:'K', 14:'A', 15:'2', 16:'S', 17:'B'};
        const div = document.createElement('div');
        div.className = `card ${c.color}`;
        div.innerHTML = `
            <div class="card-val">${map[c.val] || c.val}</div>
            <div class="card-suit">${c.suit}</div>
        `;
        return div;
    },

    toggleSelect(i) {
        if (this.turn !== 'player') return;
        const pos = this.selectedIndices.indexOf(i);
        if (pos > -1) this.selectedIndices.splice(pos, 1);
        else this.selectedIndices.push(i);
        this.render();
    },

    play() {
        if (this.turn !== 'player') return;
        const selected = this.selectedIndices.map(i => this.playerHand[i]);
        if (CardRule.canBeat(selected, this.lastMove)) {
            const moveInfo = CardRule.getType(selected);
            this.executeMove('player', selected, moveInfo);
            
            if (this.playerHand.length === 0) {
                this.showMsg("你赢了！");
                return;
            }
            
            this.turn = 'ai';
            setTimeout(() => this.aiThink(), 1000);
        } else {
            this.showMsg("不符合规则或太小！", "#e74c3c");
        }
    },

    pass() {
        if (this.turn !== 'player' || !this.lastMove) return;
        document.getElementById('player-out').innerHTML = '<span style="color:#aaa; font-style:italic">不出</span>';
        this.lastMove = null;
        this.turn = 'ai';
        setTimeout(() => this.aiThink(), 800);
    },

    executeMove(role, cards, info) {
        this.lastMove = { ...info, cards };
        const outArea = document.getElementById(role + '-out');
        outArea.innerHTML = '';
        cards.forEach(c => outArea.appendChild(this.createCardEl(c)));

        if (role === 'player') {
            this.playerHand = this.playerHand.filter(c => !cards.includes(c));
            this.selectedIndices = [];
        } else {
            this.aiHand = this.aiHand.filter(c => !cards.includes(c));
        }

        if (info.type === 'BOMB' || info.type === 'ROCKET') {
            this.showMsg(info.type, "#f1c40f");
            document.getElementById('table').classList.add('shake');
            setTimeout(() => document.getElementById('table').classList.remove('shake'), 500);
        }

        this.render();
    },

    aiThink() {
        // AI 极简逻辑优化版
        const hand = [...this.aiHand].sort((a,b) => a.val - b.val);
        let bestCards = null;

        if (!this.lastMove) {
            // 出最小单张
            bestCards = [hand[0]];
        } else {
            // 简单搜索比上家大的最小牌
            if (this.lastMove.type === 'SINGLE') {
                const c = hand.find(x => x.val > this.lastMove.weight);
                if (c) bestCards = [c];
            } else if (this.lastMove.type === 'PAIR') {
                for(let i=0; i<hand.length-1; i++) {
                    if(hand[i].val === hand[i+1].val && hand[i].val > this.lastMove.weight) {
                        bestCards = [hand[i], hand[i+1]];
                        break;
                    }
                }
            }
            // 如果没找到，尝试炸弹
            if (!bestCards) {
                for(let i=0; i<hand.length-3; i++) {
                    if(hand[i].val === hand[i+3].val) {
                        bestCards = hand.slice(i, i+4);
                        break;
                    }
                }
            }
        }

        if (bestCards) {
            this.executeMove('ai', bestCards, CardRule.getType(bestCards));
            if (this.aiHand.length === 0) this.showMsg("AI 赢了");
        } else {
            document.getElementById('ai-out').innerHTML = '<span style="color:#aaa; font-style:italic">不要</span>';
            this.lastMove = null;
        }
        this.turn = 'player';
    },

    showMsg(txt, color) {
        const box = document.getElementById('msg-box');
        box.innerText = txt;
        box.style.color = color || 'var(--gold)';
        box.style.opacity = 1;
        setTimeout(() => box.style.opacity = 0, 1500);
    },

    hint() {
        const hand = [...this.playerHand].sort((a,b) => a.val - b.val);
        let found = null;
        if (!this.lastMove) {
            found = [hand[0]];
        } else {
            // 复用简单的搜索逻辑
            if (this.lastMove.type === 'SINGLE') {
                const c = hand.find(x => x.val > this.lastMove.weight);
                if (c) found = [c];
            }
        }

        if (found) {
            this.selectedIndices = found.map(fc => this.playerHand.indexOf(fc));
            this.render();
        }
    }
};
</script>
</body>
</html>
